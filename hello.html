<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Welcome — Saurabh</title>
  <style>
    :root{--bg:#f0f6ff;--card:#ffffff;--accent:#2563eb}
    body{margin:0;font-family:Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);display:flex;align-items:center;justify-content:center;height:100vh}
    .card{background:var(--card);padding:28px 32px;border-radius:12px;box-shadow:0 6px 18px rgba(37,99,235,0.12);max-width:560px;text-align:center}
    h1{color:var(--accent);margin:0 0 8px;font-size:2rem}
    p{color:#334155;margin:0 0 16px}
    .small{font-size:0.9rem;color:#64748b}
    a.button{display:inline-block;margin-top:12px;padding:8px 14px;border-radius:8px;background:var(--accent);color:white;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome, Saurabh!</h1>
    <p>Glad you're here — this is a simple welcome homepage made just for you.</p>
    <p class="small">Tip: edit this file to customize your message, colors, or add links.</p>
    <a class="button" href="myname.html">View the sample list page</a>
  </div>
</body>
</html>
